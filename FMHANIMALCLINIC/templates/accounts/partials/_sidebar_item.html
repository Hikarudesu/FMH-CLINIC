{% load static %}
{# Sidebar item partial template for permission-based rendering #}
{% if has_access %}
<a
  href="{% url url_name %}"
  class="sidebar-link {% if request.resolver_match.url_name == url_name|cut:':' %}active{% endif %}"
>
  <i class="bx {{ icon }}"></i>
  <span style="flex-grow: 1">{{ label }}</span>
  {% if badge_count %}
  <span
    class="badge"
    style="
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-left: auto;
    "
    >{{ badge_count }}</span
  >
  {% endif %}
</a>
{% endif %}
